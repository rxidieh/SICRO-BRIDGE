services:
  - type: web
    name: sicro-bridge
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: MQTT_HOST
        sync: false      # ex.: xxxxxxxx.s1.eu.hivemq.cloud
      - key: MQTT_PORT
        value: "8883"
      - key: MQTT_USER
        sync: false
      - key: MQTT_PASS
        sync: false
      - key: BRIDGE_TOKEN
        sync: false      # segredo compartilhado (opcional, mas recomendado)
